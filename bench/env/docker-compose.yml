services:

  responder:
    image: strongx509/strongswan:latest
    container_name: responder
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_MODULE
    stdin_open: true
    tty: true
    volumes:
      - ./responder/swanctl:/etc/swanctl
      - ./responder/strongswan.conf:/etc/strongswan.conf
    command: ["sh", "-c", "/usr/libexec/ipsec/charon"]
    networks:
      pmtud-net:
        ipv4_address: 192.168.100.2

  #################################################################
  # INITIATOR MINIMAL WITH STRONGSWAN 
  #################################################################
  initiator:
    image: strongx509/strongswan:latest
    container_name: initiator_classic
    depends_on:
      - responder
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_MODULE
    command: ["sh", "-c", "/usr/libexec/ipsec/charon"]
    volumes:
      - ./initiator_classic/swanctl:/etc/swanctl
      - ./initiator_classic/strongswan.conf:/etc/strongswan.conf
      - ./initiator_classic/charon.log:/var/log/charon.log
    networks:
      pmtud-net:
         ipv4_address: 192.168.100.3

  #################################################################
  # INITIATOR MINIMAL WITH STRONGSWAN 
  #################################################################
  minimal:
    build: initiator_minimal
    container_name: initiator_minimal
    volumes:
      - ./initiator_minimal/conf.ini:/app/conf.ini
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_MODULE
    networks:
      pmtud-net:
         ipv4_address: 192.168.100.5

networks:
  pmtud-net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.100.0/24
    driver_opts:
      com.docker.network.driver.mtu: 1500

